    <title>Diagnostic Model Pilot</title>
    <style>

      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f5;
        --color-background-tertiary: #e8e8e8;

        --color-text-secondary: #666666;
        --color-text-tertiary: #999999;
        --color-border-secondary: #d0d0d0;
        --color-border-tertiary: #e8e8e8;
        --border-radius-md: 6px;
        --border-radius-lg: 8px;
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
    </style>
  </head>

    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
